  <script type="text/babel">
// components.jsx — shared building blocks for the field app
// Icons (line, editorial), Phone shell (slimmer than full iOS frame),
// Admiralty Bay map (stylized chart), Signature pad, Gear glyphs.

const { useState, useRef, useEffect, useMemo } = React;

// ── Icons (1.5px stroke, editorial) ──────────────────────────────────────
function I(props) {
  const { d, size = 18, fill = "none", stroke = "currentColor", sw = 1.5, children } = props;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill}
      stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      style={{ flexShrink: 0 }}>
      {d ? <path d={d}/> : children}
    </svg>
  );
}

// ── Gear glyphs (stylized SVG for fleet items) ───────────────────────────
function GearGlyph({ type, color = "currentColor", size = 22 }) {
  const s = { width: size, height: size, flexShrink: 0 };
  switch (type) {
    case "paddleboard":
      return <svg style={s} viewBox="0 0 32 32" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <ellipse cx="16" cy="16" rx="4" ry="13.5"/>
        <path d="M16 8v16M22 2v28M21 4l2-2M23 28l-2 2"/>
      </svg>;
    case "kayak":
      return <svg style={s} viewBox="0 0 32 32" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 16c4 6 22 6 26 0M3 16c4-6 22-6 26 0M11 16v2M21 16v2"/>
        <path d="M8 6l4 6M24 26l-4-6"/>
      </svg>;
    case "snorkel":
      return <svg style={s} viewBox="0 0 32 32" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 14c0-3 4-5 10-5s10 2 10 5v3c0 2-3 3-6 3h-1l-3 3-3-3h-1c-3 0-6-1-6-3v-3z"/>
        <path d="M22 14V6M22 6l3 2"/>
      </svg>;
    case "float":
      return <svg style={s} viewBox="0 0 32 32" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="16" cy="16" r="10"/><circle cx="16" cy="16" r="4"/>
        <path d="M6 16h4M22 16h4M16 6v4M16 22v4"/>
      </svg>;
    case "beach":
      return <svg style={s} viewBox="0 0 32 32" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M16 5v22M5 14a11 11 0 0 1 22 0H5z"/>
        <path d="M14 27h4"/>
      </svg>;
    default: return null;
  }
}

// ── Phone shell — editorial, slimmer than full iOS frame ─────────────────
function Phone({ theme, width = 320, height = 660, dark, children, statusTime = "9:41", noScroll }) {
  const isDark = dark ?? theme.name === "Midnight";
  return (
    <div style={{
      width, height, borderRadius: 44, overflow: "hidden",
      position: "relative", background: theme.bg,
      boxShadow: `0 24px 60px rgba(15,18,22,0.18), 0 0 0 1px ${theme.deviceFrame}, 0 0 0 8px ${theme.deviceFrame}`,
      fontFamily: window.APR_FONTS.ui, color: theme.ink,
    }}>
      {/* dynamic island */}
      <div style={{
        position: "absolute", top: 8, left: "50%", transform: "translateX(-50%)",
        width: 104, height: 30, borderRadius: 20, background: "#000", zIndex: 50,
      }}/>
      {/* status bar */}
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, height: 44,
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "14px 22px 0", zIndex: 20, color: isDark ? "#fff" : "#000",
        fontSize: 13, fontWeight: 600, letterSpacing: 0.2,
      }}>
        <span style={{ fontVariantNumeric: "tabular-nums" }}>{statusTime}</span>
        <span style={{ display: "flex", gap: 5, alignItems: "center" }}>
          <svg width="15" height="10" viewBox="0 0 15 10"><rect x="0" y="6" width="2.5" height="4" rx=".5" fill="currentColor"/><rect x="4" y="4" width="2.5" height="6" rx=".5" fill="currentColor"/><rect x="8" y="2" width="2.5" height="8" rx=".5" fill="currentColor"/><rect x="12" y="0" width="2.5" height="10" rx=".5" fill="currentColor"/></svg>
          <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="19" height="9" rx="2.5" stroke="currentColor" strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="16" height="6" rx="1.5" fill="currentColor"/><rect x="20" y="3" width="1.5" height="4" rx=".5" fill="currentColor" fillOpacity=".4"/></svg>
        </span>
      </div>
      {/* content */}
      <div style={{
        position: "absolute", inset: 0,
        overflow: noScroll ? "hidden" : "auto",
        WebkitOverflowScrolling: "touch",
      }}>{children}</div>
      {/* home indicator */}
      <div style={{
        position: "absolute", bottom: 7, left: "50%", transform: "translateX(-50%)",

        background: isDark ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.30)",

      }}/>
    </div>
  );
}

// ── Admiralty Bay chart ─────────────────────────────────────────────────
// Stylized antique-nautical look of Bequia's Admiralty Bay (horseshoe
// opening west). Coordinates roughly: land mass to the east + south, water
// to the west. Locations: Port Elizabeth (north), Princess Margaret Beach
// (east-central), Lower Bay (south), Anchorage moorings (open water).
function AdmiraltyBay({ theme, width = 280, height = 220, activePin, pins = [] }) {
  const t = theme;
  return (
    <svg viewBox="0 0 320 260" width={width} height={height}
      style={{ display: "block", background: t.chartWater, borderRadius: 14 }}>
      <defs>
        <pattern id="waterHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(35)">
          <line x1="0" y1="0" x2="0" y2="6" stroke={t.chartContour} strokeWidth=".5"/>
        </pattern>
        <pattern id="landDots" patternUnits="userSpaceOnUse" width="7" height="7">
          <circle cx="1" cy="1" r=".6" fill={t.chartContour}/>
        </pattern>
      </defs>
      {/* water hatch */}
      <rect x="0" y="0" width="320" height="260" fill="url(#waterHatch)" opacity=".45"/>
      {/* land mass (Bequia shore — curves around east + south, opening west) */}
      <path d="M 320 0 L 320 260 L 60 260 Q 100 220 130 200 Q 165 180 195 165 Q 230 145 255 125 Q 280 100 295 75 Q 310 45 320 0 Z"
        fill={t.chartLand}/>
      <path d="M 320 0 L 320 260 L 60 260 Q 100 220 130 200 Q 165 180 195 165 Q 230 145 255 125 Q 280 100 295 75 Q 310 45 320 0 Z"
        fill="url(#landDots)" opacity=".6"/>
      {/* contour lines on land */}
      {[
        "M 320 30 Q 295 55 285 85 Q 270 115 255 135 Q 230 158 200 175 Q 170 192 140 210 Q 120 222 100 240",
        "M 320 90 Q 300 110 290 130 Q 275 152 260 168 Q 240 188 220 200 Q 200 215 180 230",
        "M 320 160 Q 305 175 290 195 Q 275 215 260 230",
      ].map((d, i) => (
        <path key={i} d={d} fill="none" stroke={t.chartContour} strokeWidth=".8" strokeDasharray="2,3" opacity=".7"/>
      ))}
      {/* depth contours in water */}
      {[40, 75, 115, 160].map((cx, i) => (
        <path key={i} d={`M -10 ${cx + i * 5} Q 60 ${cx + 20} 90 ${cx + 10} T 200 ${cx + 5}`}
          fill="none" stroke={t.chartContour} strokeWidth=".5" opacity=".6"/>
      ))}
      {/* shoreline */}
      <path d="M 320 0 Q 295 55 285 85 Q 270 115 255 135 Q 230 158 200 175 Q 170 192 140 210 Q 120 222 100 240 L 60 260"
        fill="none" stroke={t.chartContour} strokeWidth="1.2"/>

      {/* labels */}
      <g style={{ fontFamily: tFont.display, fontSize: 11, fontStyle: "italic", fill: t.ink, opacity: 0.7 }}>
        <text x="282" y="60" textAnchor="end">Port Elizabeth</text>
        <text x="265" y="160" textAnchor="end">Princess Margaret</text>
        <text x="200" y="232" textAnchor="end">Lower Bay</text>
        <text x="40" y="40" style={{ fontStyle: "italic", fontSize: 10 }}>Admiralty Bay</text>
        <text x="40" y="55" style={{ fontStyle: "italic", fontSize: 9, opacity: .55 }}>Bequia · SVG</text>
      </g>

      {/* compass rose */}
      <g transform="translate(40,210)" stroke={t.chartContour} strokeWidth="1" fill="none">
        <circle r="14"/>

// ── Signature pad (lightweight, with placeholder line) ───────────────────
function SignaturePad({ theme, signed, onSign, width = "100%", height = 130 }) {
  const ref = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);

  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    ctx.scale(2, 2);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.strokeStyle = theme.ink; ctx.lineWidth = 1.8;
  }, [theme.ink]);

  function pos(e) {
    const c = ref.current; const r = c.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - r.left, y: p.clientY - r.top };
  }
  function start(e) { e.preventDefault(); drawing.current = true; last.current = pos(e); }
  function move(e) {
    if (!drawing.current) return; e.preventDefault();
    const c = ref.current; const ctx = c.getContext("2d");
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
    if (!signed) onSign?.(true);
  }
  function end() { drawing.current = false; }

  function clear() {
    const c = ref.current; const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    onSign?.(false);
  }

  return (
    <div style={{
      position: "relative", background: theme.paper, borderRadius: 10,
      border: `1px solid ${theme.rule}`, overflow: "hidden",
    }}>
      <canvas ref={ref}
        width={600} height={height * 2}
        style={{ width: "100%", height, display: "block", touchAction: "none" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      {!signed && (
        <div style={{
          position: "absolute", left: 16, right: 16, bottom: 30,
          borderBottom: `1px solid ${theme.ruleStrong}`,
          fontFamily: tFont.display, fontStyle: "italic",
          color: theme.inkFaint, fontSize: 13, paddingBottom: 4, pointerEvents: "none",
        }}>
          Sign here
        </div>
      )}
      <button onClick={clear} style={{
        position: "absolute", top: 8, right: 10, background: "transparent",
        border: "none", color: theme.inkFaint, fontFamily: tFont.ui,
        fontSize: 11, letterSpacing: 1, textTransform: "uppercase", cursor: "pointer",
      }}>Clear</button>
    </div>
  );
}

// ── Small primitives ─────────────────────────────────────────────────────
function Eyebrow({ children, theme, color }) {
  return (
    <div style={{
      fontFamily: tFont.ui, fontSize: 10, fontWeight: 600, letterSpacing: 2.2,

function MonoCode({ children, theme }) {

  <script type="text/babel">
// screen-scan.jsx — QR scan & gear checkout flow
const { useState: uSs, useEffect: uEs } = React;

function ScreenScan({ theme, go, job }) {
  const t = theme;
  const isDark = t.name === "Midnight";
  const j = job ?? window.APR_DATA.todayDispatches[0];
  const [scanned, setScanned] = uSs([j.items[0].code]); // first item pre-scanned
  const [scanning, setScanning] = uSs(true);

  uEs(() => {
    // simulate auto-scan progression: every 2.2s "find" the next item
    if (!scanning) return;
    const next = j.items.find(it => !scanned.includes(it.code));
    if (!next) { setScanning(false); return; }
    const id = setTimeout(() => setScanned(s => [...s, next.code]), 2400);
    return () => clearTimeout(id);
  }, [scanned, scanning, j.items]);

  const allDone = scanned.length === j.items.length;
  const latest = j.items.find(it => it.code === scanned[scanned.length - 1]);

  return (
    <div style={{ minHeight: "100%", background: t.bg, display: "flex", flexDirection: "column" }}>
      <TopBar theme={t} title="Scan gear" subtitle={`Job · ${j.id}`} onBack={() => go("job")}/>

      {/* Viewfinder */}
      <div style={{ padding: "0 22px" }}>
        <div style={{
          position: "relative", aspectRatio: "1 / 1.05",
          borderRadius: 22, overflow: "hidden",
          background: isDark
            ? `radial-gradient(circle at 50% 40%, ${t.paperWarm}, ${t.bg} 65%)`
            : `radial-gradient(circle at 50% 40%, ${t.sea}33, ${t.paper})`,
          border: `1px solid ${t.rule}`,
        }}>
          {/* simulated camera grain */}
          <svg width="100%" height="100%" viewBox="0 0 200 200" preserveAspectRatio="none"
            style={{ position: "absolute", inset: 0, opacity: 0.15 }}>
            <defs>
              <pattern id="grain" patternUnits="userSpaceOnUse" width="3" height="3">
                <circle cx="1" cy="1" r=".5" fill={t.ink}/>
              </pattern>
            </defs>
            <rect width="200" height="200" fill="url(#grain)"/>
          </svg>

          {/* sun glints / faux gear silhouette */}
          <svg viewBox="0 0 200 200" preserveAspectRatio="none"
            style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
            <ellipse cx="100" cy="120" rx="70" ry="14" fill={t.gold} opacity=".22"/>
            <ellipse cx="100" cy="105" rx="34" ry="65" fill={t.coral} opacity=".4"/>
            <rect x="98" y="40" width="4" height="90" fill={t.ink} opacity=".55" rx="1"/>
            <rect x="80" y="33" width="40" height="6" fill={t.ink} opacity=".55" rx="1"/>
          </svg>

          {/* viewfinder corners */}
          {[
            { top: 22, left: 22, b: ["t", "l"] },
            { top: 22, right: 22, b: ["t", "r"] },
            { bottom: 22, left: 22, b: ["b", "l"] },
            { bottom: 22, right: 22, b: ["b", "r"] },
          ].map((c, i) => (
            <div key={i} style={{
              position: "absolute", width: 30, height: 30,
              borderTop: c.b.includes("t") ? `2px solid ${t.gold}` : "none",
              borderBottom: c.b.includes("b") ? `2px solid ${t.gold}` : "none",
              borderLeft: c.b.includes("l") ? `2px solid ${t.gold}` : "none",
              borderRight: c.b.includes("r") ? `2px solid ${t.gold}` : "none",
              borderTopLeftRadius: c.b.includes("t") && c.b.includes("l") ? 8 : 0,
              borderTopRightRadius: c.b.includes("t") && c.b.includes("r") ? 8 : 0,
              borderBottomLeftRadius: c.b.includes("b") && c.b.includes("l") ? 8 : 0,
              borderBottomRightRadius: c.b.includes("b") && c.b.includes("r") ? 8 : 0,
              top: c.top, left: c.left, right: c.right, bottom: c.bottom,
            }}/>
          ))}

          {/* scan line */}
          {!allDone && (
            <div style={{
              position: "absolute", top: 30, left: 30, right: 30, height: 2,
              background: `linear-gradient(90deg, transparent, ${t.gold}, transparent)`,
              animation: "scanLine 2.2s ease-in-out infinite",
            }}/>
          )}

          {/* QR overlay label */}
          <div style={{
            position: "absolute", left: 22, bottom: 22, right: 22,
            display: "flex", alignItems: "center", gap: 8,
            background: "rgba(0,0,0,0.55)", padding: "8px 12px", borderRadius: 999,
            color: "#fff", fontFamily: tFont.mono, fontSize: 9.5, letterSpacing: 1.2,
          }}>
            <span style={{
              width: 6, height: 6, borderRadius: 999, background: allDone ? t.success : t.gold,
              animation: allDone ? "none" : "pulse 1.4s infinite",
            }}/>
            {allDone ? "ALL ITEMS VERIFIED" : `SCANNING · ${latest ? latest.code : "—"}`}
          </div>

          {/* current capture readout (top) */}
          <div style={{
            position: "absolute", top: 18, left: 18, right: 18,
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <span style={{
              fontFamily: tFont.mono, fontSize: 9, letterSpacing: 1.5,
              color: "#fff", background: "rgba(0,0,0,0.45)", padding: "5px 9px", borderRadius: 999,
            }}>APR:{latest ? latest.code : "—"}|BEQUIA|SVG</span>
            <button style={{
              width: 30, height: 30, borderRadius: 999, border: "none",
              background: "rgba(0,0,0,0.45)", color: "#fff", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}><Icons.x size={14}/></button>
          </div>
        </div>
      </div>

      {/* Item checklist */}
      <div style={{ padding: "18px 22px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          <Eyebrow theme={t}>Manifest · {scanned.length}/{j.items.length} verified</Eyebrow>
          <button onClick={() => { setScanned(j.items.map(i => i.code)); setScanning(false); }}
            style={{
              background: "transparent", border: "none", color: t.inkSoft, cursor: "pointer",
              fontFamily: tFont.ui, fontSize: 10, fontWeight: 600, letterSpacing: 1.4, textTransform: "uppercase",
            }}>Mark all</button>
        </div>

        <div style={{ background: t.paper, borderRadius: 14, border: `1px solid ${t.rule}`, overflow: "hidden" }}>
          {j.items.map((it, i) => {
            const done = scanned.includes(it.code);
            return (
              <div key={it.code} style={{
                padding: "12px 14px", display: "flex", alignItems: "center", gap: 12,
                borderTop: i ? `1px solid ${t.rule}` : "none",
                opacity: done ? 1 : 0.5, transition: "opacity .3s",
              }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 999,
                  background: done ? t.success : "transparent",
                  border: done ? "none" : `1.5px dashed ${t.ruleStrong}`,
                  display: "flex", alignItems: "center", justifyContent: "center", color: "#fff",
                }}>{done && <Icons.check size={14} stroke="#fff"/>}</div>
                <GearGlyph type={it.type} color={done ? t.brand : t.inkFaint} size={20}/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{

                  <div style={{

                </div>
                <span style={{
                  fontFamily: tFont.mono, fontSize: 9, color: t.inkFaint,
                }}>{done ? "09:0" + (i + 2) + "AM" : "—"}</span>
              </div>
            );
          })}
        </div>

        {/* Safety preflight */}
        <div style={{
          marginTop: 14, background: t.paper, borderRadius: 14, border: `1px solid ${t.rule}`,
          padding: "12px 14px",
        }}>
          <Eyebrow theme={t}>Safety preflight</Eyebrow>
          <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
            {[
              { l: "PFDs verified at dispatch", on: true },
              { l: "Safety whistles confirmed", on: true },
              { l: "Wind / current acceptable (ENE 12kt)", on: true },
            ].map((c, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{
                  width: 18, height: 18, borderRadius: 5,
                  background: c.on ? t.success : "transparent",
                  border: c.on ? "none" : `1.5px solid ${t.ruleStrong}`,
                  display: "flex", alignItems: "center", justifyContent: "center", color: "#fff",
                }}>{c.on && <Icons.check size={11} stroke="#fff"/>}</span>
                <span style={{ flex: 1, fontFamily: tFont.ui, fontSize: 11.5, color: t.ink }}>{c.l}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Action */}
      <div style={{ padding: "18px 22px 100px" }}>
        <FillButton theme={t} color={allDone ? t.gold : t.inkFaint}
          ink={isDark ? t.bg : "#fff"} onClick={() => allDone && go("waiver")}>
          {allDone ? "Continue to waiver" : `Scanning · ${scanned.length}/${j.items.length}`}
          <Icons.arrowR size={14}/>
        </FillButton>
      </div>

      <TabBar theme={t} current="scan" go={go}/>

      <style>{`
        @keyframes scanLine {

  <script type="text/babel">
// app-root — production single-phone shell for the Aquatic Paradise field app.
// Replaces the design-canvas/tweaks chrome with one full-screen, responsive
// phone that scales to fit any device, plus a day/night theme toggle.
const { useState: uApp, useEffect: uAppE } = React;

const APR_HERO = "chart";   // welcome hero treatment: chart | photo | waves | wordmark

function PhoneScreens({ theme, screen, go, activeJob, setActiveJob, worker }) {
  const t = theme;
  const map = {
    welcome: <ScreenWelcome theme={t} heroVariant={APR_HERO} worker={worker} go={go}/>,
    today:   <ScreenToday   theme={t} go={go} setActiveJob={setActiveJob}/>,
    job:     <ScreenJob     theme={t} go={go} job={activeJob}/>,
    scan:    <ScreenScan    theme={t} go={go} job={activeJob}/>,
    waiver:  <ScreenWaiver  theme={t} go={go} job={activeJob}/>,
    deliver: <ScreenDeliver theme={t} go={go} job={activeJob}/>,
    fleet:   <ScreenFleet   theme={t} go={go}/>,
  };
  return map[screen] ?? map.today;
}

function FieldApp() {
  const [themeKey, setThemeKey] = uApp("linen");
  const [screen, setScreen]     = uApp("welcome");
  const [activeJob, setActive]  = uApp(window.APR_DATA.todayDispatches[0]);
  const [scale, setScale]       = uApp(1);
  const worker = "Shamar";
  const t = window.APR_THEMES[themeKey];
  const HEADER = 54;

  // Fit the fixed 320x660 phone into whatever space the device gives us.
  uAppE(() => {
    function fit() {
      const availW = window.innerWidth;
      const availH = window.innerHeight - HEADER;
      const s = Math.min(availW / (320 + 20), availH / (660 + 20), 1.4);
      setScale(s);
    }
    fit();
    window.addEventListener("resize", fit);
    window.addEventListener("orientationchange", fit);
    return () => {
      window.removeEventListener("resize", fit);
      window.removeEventListener("orientationchange", fit);
    };
  }, []);

  uAppE(() => {
    document.body.style.background = t.bg;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", t.bg);
  }, [t.bg]);

  const go = (s) => setScreen(s);
  const setActiveJob = (j) => setActive(j);

  return (
    <div style={{
      position: "fixed", inset: 0, background: t.bg,
      display: "flex", flexDirection: "column", overflow: "hidden",
      transition: "background .45s ease",
    }}>
      {/* App chrome header */}
      <header style={{
        height: HEADER, flexShrink: 0,
        paddingTop: "env(safe-area-inset-top)",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 16px", borderBottom: `1px solid ${t.rule}`,
        background: t.chrome, backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src="assets/logo.jpeg" width={30} height={30}
            style={{ borderRadius: 999, objectFit: "cover", border: `1px solid ${t.rule}` }}/>
          <div style={{ lineHeight: 1.05 }}>
            <div style={{
              fontFamily: window.APR_FONTS.display, fontSize: 16, fontWeight: 500,
              letterSpacing: 0.3, color: t.ink,
            }}>Aquatic Paradise</div>
            <div style={{
              fontFamily: window.APR_FONTS.ui, fontSize: 8.5, letterSpacing: 2.2,
              textTransform: "uppercase", color: t.inkSoft, marginTop: 1,
            }}>Field Dispatch · {t.mode}</div>
          </div>
        </div>

        <button onClick={() => setThemeKey(k => k === "linen" ? "midnight" : "linen")}
          aria-label="Toggle day and night theme" title="Toggle day / night"
          style={{
            width: 40, height: 40, borderRadius: 999, cursor: "pointer",
            border: `1px solid ${t.chromeBorder}`, background: t.paper, color: t.ink,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
          {themeKey === "linen" ? <Icons.moon size={17}/> : <Icons.sun size={17}/>}
        </button>
      </header>

      {/* Stage */}
      <main style={{
        flex: 1, minHeight: 0, position: "relative",
        display: "flex", alignItems: "center", justifyContent: "center",
        overflow: "hidden",
      }}>
        <div style={{ transform: `scale(${scale})`, transformOrigin: "center center" }}>
          {/* key resets the phone's scroll position on each navigation / theme change */}
          <Phone key={screen + themeKey} theme={t} width={320} height={660}>
            <PhoneScreens theme={t} screen={screen} go={go}
              activeJob={activeJob} setActiveJob={setActiveJob} worker={worker}/>
          </Phone>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FieldApp/>);

  </script>
